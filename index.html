<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>こんにちは</title>
  <script>
function updateClock() {
  const now = new Date();

  const seconds = now.getSeconds();
  const minutes = now.getMinutes();
  const hours = now.getHours();

  const secondDeg = seconds * 6;
  const minuteDeg = minutes * 6 + seconds * 0.1;
  const hourDeg = hours * 30 + minutes * 0.5;

  document.querySelector(".second").style.transform =
    `translateX(-50%) rotate(${secondDeg}deg)`;

  document.querySelector(".minute").style.transform =
    `translateX(-50%) rotate(${minuteDeg}deg)`;

  document.querySelector(".hour").style.transform =
    `translateX(-50%) rotate(${hourDeg}deg)`;
}

function createNumbers() {
  const numbersContainer = document.querySelector(".numbers");

  for (let i = 1; i <= 12; i++) {
    const num = document.createElement("div");
    num.className = "number";
    num.innerText = i;

    const angle = i * 30; // 360 ÷ 12

    num.style.transform =
      `rotate(${angle}deg) translate(80px) rotate(-${angle}deg)`;

    numbersContainer.appendChild(num);
  }
}

createNumbers();
   
// 1秒ごとに更新
setInterval(updateClock, 1000);

// 初回実行
updateClock();
</script>
</head>
<body>
  <div class="navbar">
    <a href="#">Home</a>
    <a href="#">About</a>
  </div>

  <div class="container">
    <div class="card">
      <h1>Hello GitHub Pages!</h1>
      <p>こんにちは</p>
      <a href="#" class="button">ボタン</a>
    </div>

    <div class="clock">
      <div class="numbers"></div>
      
      <div class="hand hour"></div>
      <div class="hand minute"></div>
      <div class="hand second"></div>
      <div class="center-dot"></div>
    </div>
  </div>
</body>
</html>
